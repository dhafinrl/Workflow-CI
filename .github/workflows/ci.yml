name: Train and Deploy Model

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  train_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install MLflow & dependencies
        run: |
          pip install mlflow==2.19.0 pandas scikit-learn
          
      - name: Run MLProject (Train Model)
        run: |
          cd MLProject
          mlflow run . --env-manager=local
          
      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: MLProject/mlruns/
          
      # ADVANCED: Build Docker image and push to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and Push Docker Image
        run: |
          cd MLProject
          # Get the latest run ID
          RUN_ID=$(ls mlruns/0/ | grep -v 'meta.yaml' | head -n 1)
          
          # Create custom Dockerfile to avoid MLflow python 3.9 pip bug
          cat <<EOF > Dockerfile
          FROM python:3.10-slim
          WORKDIR /app
          COPY . .
          RUN pip install mlflow==2.19.0 pandas scikit-learn
          CMD ["mlflow", "models", "serve", "-m", "mlruns/0/$RUN_ID/artifacts/model", "-p", "5001", "-h", "0.0.0.0", "--env-manager=local"]
          EOF
          
          # Build docker image
          docker build -t ${{ secrets.DOCKER_USERNAME }}/titanic-model:latest .
          
          # Push to docker hub
          docker push ${{ secrets.DOCKER_USERNAME }}/titanic-model:latest
